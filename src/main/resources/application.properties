# --- CONEXIÓN A BASE DE DATOS ---
# La URL: localhost, puerto 3307, base de datos 'Wurger'
spring.datasource.url=jdbc:mysql://localhost:3307/Wurger?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# --- TUS CREDENCIALES (CÁMBIALAS) ---
spring.datasource.username=root
spring.datasource.password=123456

# Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- CONFIGURACIÓN DE HIBERNATE (JPA) ---
# 'update': Actualiza la estructura si agregas campos nuevos, pero NO borra tus datos.
# 'validate': Solo revisa que la BD coincida con Java (bueno para producción).
spring.jpa.hibernate.ddl-auto=update

# Dialecto para que hable bien con MySQL 8 o superior
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- VISUALIZACIÓN (Opcional) ---
# Muestra las consultas SQL en la consola (útil para ver qué hace tu app)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

